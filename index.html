<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RemoteLink</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Syne',sans-serif;background:#0a0a0f;color:#e8e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .btn{padding:1.1rem 3rem;border-radius:12px;border:none;font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.5px}
    .btn-deny{background:#ff4466;color:#fff}.btn-deny:hover{filter:brightness(1.15);transform:translateY(-2px)}
    .btn-allow{background:#00ff88;color:#000}.btn-allow:hover{filter:brightness(1.1);transform:translateY(-2px)}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .btn-row{display:flex;gap:1.5rem}
    .msg{font-size:.85rem;color:#555570;font-family:monospace;text-align:center;margin-top:1rem}
    .hidden{display:none!important}
  </style>
</head>
<body>

<div id="permissionScreen" style="display:flex;flex-direction:column;align-items:center">
  <div class="btn-row">
    <button class="btn btn-deny" id="denyBtn" onclick="denyAccess()">❌ DENY</button>
    <button class="btn btn-allow" id="allowBtn" onclick="allowAccess()">✅ ALLOW</button>
  </div>
  <div class="msg" id="statusMsg"></div>
</div>

<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script>
  const socket = io();
  let peerConnection = null;
  const sessionId = window.location.pathname.split('/').pop();
  const iceConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

  // Tell server someone is here
  socket.emit('request-access', { sessionId });

  function allowAccess() {
    document.getElementById('allowBtn').disabled = true;
    document.getElementById('denyBtn').disabled = true;
    document.getElementById('statusMsg').textContent = 'Connecting...';
    setupWebRTC();
  }

  function denyAccess() {
    socket.emit('deny-access', { sessionId });
    document.getElementById('permissionScreen').innerHTML = '<div style="font-family:monospace;color:#555570">Access denied.</div>';
  }

  async function setupWebRTC() {
    peerConnection = new RTCPeerConnection(iceConfig);

    peerConnection.ondatachannel = (e) => { e.channel.onopen = () => console.log('Control ready'); };

    peerConnection.onicecandidate = (e) => {
      if (e.candidate) socket.emit('ice-candidate', { sessionId, candidate: e.candidate, target: 'host' });
    };
  }

  socket.on('access-allowed', async () => {
    if (!peerConnection) await setupWebRTC();
    document.getElementById('statusMsg').textContent = 'Access granted...';
  });

  socket.on('access-denied', () => {
    document.getElementById('permissionScreen').innerHTML = '<div style="font-family:monospace;color:#555570">Access was denied by host.</div>';
  });

  socket.on('session-not-found', () => {
    document.getElementById('permissionScreen').innerHTML = '<div style="font-family:monospace;color:#ff4466">Session not found or expired.</div>';
  });

  socket.on('offer', async ({ offer }) => {
    if (!peerConnection) await setupWebRTC();
    await peerConnection.setRemoteDescription(offer);
    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    socket.emit('answer', { sessionId, answer });
    // Hide buttons — User B's screen stays completely normal
    document.getElementById('permissionScreen').classList.add('hidden');
  });

  socket.on('ice-candidate', async ({ candidate }) => {
    if (peerConnection && candidate) await peerConnection.addIceCandidate(candidate);
  });

  socket.on('session-ended', () => {
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:monospace;color:#555570">Session ended.</div>';
  });

  // Send mouse/keyboard events to host for remote control
  document.addEventListener('mousemove', (e) => {
    socket.emit('remote-control', { sessionId, event: { type:'mousemove', x: e.clientX/window.innerWidth, y: e.clientY/window.innerHeight }});
  });
  document.addEventListener('click', (e) => {
    socket.emit('remote-control', { sessionId, event: { type:'click', x: e.clientX/window.innerWidth, y: e.clientY/window.innerHeight }});
  });
  document.addEventListener('keydown', (e) => {
    socket.emit('remote-control', { sessionId, event: { type:'keydown', key: e.key, code: e.code }});
  });
</script>
</body>
</html>
