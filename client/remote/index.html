<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RemoteLink</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Syne',sans-serif;background:#0a0a0f;color:#e8e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .btn{padding:1.1rem 3rem;border-radius:12px;border:none;font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.5px}
    .btn-deny{background:#ff4466;color:#fff}.btn-deny:hover{filter:brightness(1.15);transform:translateY(-2px)}
    .btn-allow{background:#00ff88;color:#000}.btn-allow:hover{filter:brightness(1.1);transform:translateY(-2px)}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}
    .btn-row{display:flex;gap:1.5rem}
    .msg{font-size:.85rem;color:#555570;font-family:monospace;text-align:center;margin-top:1rem}

    /* Full screen video after connection */
    #streamScreen{display:none;position:fixed;inset:0;background:#000;z-index:999}
    #streamScreen.show{display:block}
    #remoteVideo{width:100%;height:100%;object-fit:contain}
  </style>
</head>
<body>

<div id="permissionScreen" style="display:flex;flex-direction:column;align-items:center">
  <div class="btn-row">
    <button class="btn btn-deny" id="denyBtn" onclick="denyAccess()">❌ DENY</button>
    <button class="btn btn-allow" id="allowBtn" onclick="allowAccess()">✅ ALLOW</button>
  </div>
  <div class="msg" id="statusMsg"></div>
</div>

<!-- This fills the screen after connection (User A sees remote screen here) -->
<div id="streamScreen">
  <video id="remoteVideo" autoplay playsinline></video>
</div>

<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script>
  const socket = io();
  let peerConnection = null;
  let allowed = false;
  const sessionId = window.location.pathname.split('/').pop();

  const iceConfig = {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
      { urls: 'stun:stun2.l.google.com:19302' },
      { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
      { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
      { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
    ]
  };

  // Tell server someone is here
  socket.emit('request-access', { sessionId });

  function allowAccess() {
    allowed = true;
    document.getElementById('allowBtn').disabled = true;
    document.getElementById('denyBtn').disabled = true;
    document.getElementById('statusMsg').textContent = 'Connecting...';
    // Setup peer connection ready to receive
    setupWebRTC();
    // Tell server user allowed (so host knows)
    socket.emit('remote-allowed', { sessionId });
  }

  function denyAccess() {
    socket.emit('deny-access', { sessionId });
    document.getElementById('permissionScreen').innerHTML = '<div style="font-family:monospace;color:#555570">Access denied.</div>';
  }

  function setupWebRTC() {
    peerConnection = new RTCPeerConnection(iceConfig);

    // When we receive the video stream from host
    peerConnection.ontrack = (e) => {
      console.log('Track received!', e.streams);
      const video = document.getElementById('remoteVideo');
      if (e.streams && e.streams[0]) {
        video.srcObject = e.streams[0];
        video.play().catch(console.error);
        // Hide permission screen, show video fullscreen
        document.getElementById('permissionScreen').style.display = 'none';
        document.getElementById('streamScreen').classList.add('show');
      }
    };

    peerConnection.onicecandidate = (e) => {
      if (e.candidate) socket.emit('ice-candidate', { sessionId, candidate: e.candidate, target: 'host' });
    };

    peerConnection.oniceconnectionstatechange = () => {
      console.log('ICE state:', peerConnection.iceConnectionState);
    };
  }

  socket.on('access-allowed', () => {
    document.getElementById('statusMsg').textContent = 'Host allowed. Waiting for stream...';
  });

  socket.on('access-denied', () => {
    document.getElementById('permissionScreen').innerHTML = '<div style="font-family:monospace;color:#ff4466">Access was denied by host.</div>';
  });

  socket.on('session-not-found', () => {
    document.getElementById('permissionScreen').innerHTML = '<div style="font-family:monospace;color:#ff4466">Session not found or expired.</div>';
  });

  // Receive offer from host and send answer
  socket.on('offer', async ({ offer }) => {
    console.log('Offer received');
    if (!peerConnection) setupWebRTC();
    try {
      await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
      const answer = await peerConnection.createAnswer();
      await peerConnection.setLocalDescription(answer);
      socket.emit('answer', { sessionId, answer });
      console.log('Answer sent');
    } catch(err) {
      console.error('Error handling offer:', err);
    }
  });

  socket.on('ice-candidate', async ({ candidate }) => {
    if (peerConnection && candidate) {
      try { await peerConnection.addIceCandidate(new RTCIceCandidate(candidate)); } catch(e) {}
    }
  });

  socket.on('session-ended', () => {
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:monospace;color:#555570;background:#0a0a0f">Session ended.</div>';
  });
</script>
</body>
</html>
