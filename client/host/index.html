<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>RemoteLink</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--sur:#12121a;--bor:#1e1e2e;--acc:#00ff88;--txt:#e8e8f0;--mut:#555570;--red:#ff4466}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem}
.logo{font-size:1.5rem;font-weight:800;margin-bottom:2rem}.logo span{color:var(--acc)}
.card{background:var(--sur);border:1px solid var(--bor);border-radius:16px;padding:2rem;width:100%;max-width:460px}
.card h2{font-size:1.4rem;font-weight:800;margin-bottom:.3rem}
.card .sub{color:var(--mut);font-size:.85rem;margin-bottom:1.8rem;font-family:'JetBrains Mono',monospace}
.btn{width:100%;padding:.95rem;border-radius:10px;border:none;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:.5rem}
.btn-g{background:var(--acc);color:#000}.btn-g:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-r{background:var(--red);color:#fff}.btn-r:hover{filter:brightness(1.1)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.info-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem}
.badge{display:inline-flex;align-items:center;gap:.4rem;padding:.35rem .8rem;border-radius:100px;font-size:.75rem;font-family:'JetBrains Mono',monospace;font-weight:700}
.b-wait{background:rgba(255,200,0,.1);color:#ffcc00;border:1px solid rgba(255,200,0,.25)}
.b-conn{background:rgba(0,255,136,.1);color:var(--acc);border:1px solid rgba(0,255,136,.25)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:p 1.5s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
.link-box{background:var(--bg);border:1px solid var(--bor);border-radius:10px;padding:.9rem 1rem;font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--acc);word-break:break-all;margin-bottom:.5rem}
.copy-btn{width:100%;padding:.65rem;background:transparent;border:1px solid var(--bor);border-radius:8px;color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:.82rem;cursor:pointer;transition:all .2s}
.copy-btn:hover{border-color:var(--acc);color:var(--acc)}
.hidden{display:none!important}
/* Viewer */
#viewer{display:none;flex-direction:column;gap:.8rem;width:100%;max-width:1200px}
#viewer.show{display:flex}
.bar{display:flex;align-items:center;justify-content:space-between;background:var(--sur);border:1px solid var(--bor);border-radius:12px;padding:.7rem 1.2rem}
.bar-l{display:flex;align-items:center;gap:.8rem}
#vid{width:100%;border-radius:12px;border:1px solid var(--bor);background:#000;display:block;max-height:80vh;object-fit:contain}
.hint{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--mut);text-align:center}
.status-line{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--acc);text-align:center;min-height:1rem}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="logo">Remote<span>Link</span></div>
  <div class="card">
    <h2>Generate Link</h2>
    <div class="sub">Share the link → they allow → you see their screen</div>

    <button class="btn btn-g" id="genBtn" onclick="createSession()">🔗 Generate Access Link</button>

    <div id="sessionPanel" class="hidden" style="margin-top:1.5rem">
      <div class="info-row">
        <span style="font-size:.8rem;color:var(--mut);font-family:'JetBrains Mono',monospace">Status</span>
        <span class="badge b-wait" id="badge"><span class="dot"></span><span id="badgeTxt">Waiting for user...</span></span>
      </div>
      <div style="font-size:.78rem;color:var(--mut);font-family:'JetBrains Mono',monospace;margin-bottom:.4rem">Send this link to the other person:</div>
      <div class="link-box" id="linkTxt"></div>
      <button class="copy-btn" onclick="copyLink()">📋 Copy Link</button>
      <button class="btn btn-r" onclick="endSession()" style="margin-top:1rem">End Session</button>
    </div>
  </div>
</div>

<!-- SCREEN VIEWER (you see their screen here) -->
<div id="viewer">
  <div class="bar">
    <div class="bar-l">
      <div class="logo" style="margin:0;font-size:1.1rem">Remote<span style="color:var(--acc)">Link</span></div>
      <span class="badge b-conn"><span class="dot"></span>Live</span>
    </div>
    <button class="btn btn-r" style="width:auto;padding:.5rem 1.1rem;font-size:.88rem" onclick="endSession()">Disconnect</button>
  </div>
  <video id="vid" autoplay playsinline muted></video>
  <div class="hint">Viewing remote screen</div>
  <div class="status-line" id="statusLine"></div>
</div>

<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script>
const socket = io();
let sessionId = null;
let pc = null;

// TURN + STUN servers for cross-network connections
const ICE = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:stun2.l.google.com:19302' },
    { urls: 'stun:stun3.l.google.com:19302' },
    { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
    { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
    { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' },
    { urls: 'turn:relay.metered.ca:80', username: 'e8dd65fc0fdea4f74b9d', credential: 'uPqRwJJq+0QhVHTm' },
    { urls: 'turn:relay.metered.ca:443', username: 'e8dd65fc0fdea4f74b9d', credential: 'uPqRwJJq+0QhVHTm' },
    { urls: 'turn:relay.metered.ca:443?transport=tcp', username: 'e8dd65fc0fdea4f74b9d', credential: 'uPqRwJJq+0QhVHTm' }
  ]
};

function setStatus(txt) { document.getElementById('statusLine').textContent = txt; }
function setBadge(txt, cls) {
  document.getElementById('badgeTxt').textContent = txt;
  document.getElementById('badge').className = 'badge ' + cls;
}

function createSession() {
  socket.emit('create-session');
  document.getElementById('genBtn').disabled = true;
  document.getElementById('genBtn').textContent = 'Generating...';
}

socket.on('session-created', ({ sessionId: id }) => {
  sessionId = id;
  const link = window.location.origin + '/remote/' + id;
  document.getElementById('linkTxt').textContent = link;
  document.getElementById('sessionPanel').classList.remove('hidden');
  document.getElementById('genBtn').classList.add('hidden');
});

function copyLink() {
  navigator.clipboard.writeText(document.getElementById('linkTxt').textContent).then(() => {
    const b = document.querySelector('.copy-btn');
    b.textContent = '✅ Copied!';
    setTimeout(() => b.textContent = '📋 Copy Link', 2000);
  });
}

// Remote user accepted — now wait for their offer (they will share screen)
socket.on('remote-accepted', () => {
  setBadge('User accepted!', 'b-conn');
  setupHostPC(); // Set up to RECEIVE stream
});

socket.on('remote-denied', () => {
  setBadge('User denied', 'b-wait');
});

// HOST sets up peer connection to RECEIVE the stream
function setupHostPC() {
  pc = new RTCPeerConnection(ICE);

  pc.ontrack = (e) => {
    console.log('Stream received!', e.streams);
    const vid = document.getElementById('vid');
    vid.srcObject = e.streams[0];
    vid.play().catch(console.error);
    // Switch to viewer
    document.getElementById('setup').style.display = 'none';
    document.getElementById('viewer').classList.add('show');
    setStatus('✅ Stream connected!');
  };

  pc.onicecandidate = (e) => {
    if (e.candidate) socket.emit('ice-candidate', { sessionId, candidate: e.candidate, from: 'host' });
  };

  pc.oniceconnectionstatechange = () => {
    setStatus('ICE: ' + pc.iceConnectionState);
    console.log('ICE state:', pc.iceConnectionState);
  };
}

// Receive offer FROM remote (they are sharing their screen)
socket.on('offer', async ({ offer }) => {
  console.log('Offer received from remote');
  if (!pc) setupHostPC();
  await pc.setRemoteDescription(new RTCSessionDescription(offer));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  socket.emit('answer', { sessionId, answer });
  setStatus('Connecting stream...');
});

socket.on('ice-candidate', async ({ candidate }) => {
  if (pc && candidate) {
    try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch(e) {}
  }
});

function endSession() {
  if (sessionId) socket.emit('end-session', { sessionId });
  location.reload();
}

socket.on('session-ended', () => location.reload());
</script>
</body>
</html>
