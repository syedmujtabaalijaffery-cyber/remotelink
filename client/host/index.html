<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RemoteLink – Host</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0f;--surface:#12121a;--border:#1e1e2e;--accent:#00ff88;--text:#e8e8f0;--muted:#555570;--danger:#ff4466}
    body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(0,255,136,.04),transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(0,153,255,.04),transparent 60%);pointer-events:none}
    .logo{font-size:1.4rem;font-weight:800;margin-bottom:2.5rem}.logo span{color:var(--accent)}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:480px}
    .card h2{font-size:1.5rem;font-weight:800;margin-bottom:.4rem}
    .card p{color:var(--muted);font-size:.9rem;margin-bottom:2rem;font-family:'JetBrains Mono',monospace}
    .btn{width:100%;padding:1rem;border-radius:10px;border:none;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s}
    .btn-primary{background:var(--accent);color:#000}.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
    .btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{filter:brightness(1.1)}
    .session-box{display:none;flex-direction:column;gap:1rem;margin-top:1.5rem}
    .session-box.active{display:flex}
    .link-display{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:1rem 1.2rem;font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--accent);word-break:break-all}
    .copy-btn{width:100%;padding:.7rem;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.85rem;cursor:pointer;transition:all .2s;margin-top:.5rem}
    .copy-btn:hover{border-color:var(--accent);color:var(--accent)}
    .status-badge{display:inline-flex;align-items:center;gap:.5rem;padding:.4rem .9rem;border-radius:100px;font-size:.8rem;font-family:'JetBrains Mono',monospace;font-weight:700}
    .status-waiting{background:rgba(255,200,0,.1);color:#ffcc00;border:1px solid rgba(255,200,0,.2)}
    .status-connected{background:rgba(0,255,136,.1);color:var(--accent);border:1px solid rgba(0,255,136,.2)}
    .status-dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center}
    .popup-overlay.show{display:flex}
    .popup{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;width:340px;text-align:center}
    .popup h3{font-size:1.2rem;margin-bottom:.5rem}
    .popup p{color:var(--muted);font-size:.85rem;margin-bottom:1.5rem;font-family:'JetBrains Mono',monospace}
    .popup-btns{display:flex;gap:1rem}
    .popup-btns .btn{flex:1;padding:.8rem}
    #remoteView{display:none;flex-direction:column;gap:1rem;width:100%;max-width:1100px;padding:1rem}
    #remoteView.active{display:flex}
    .toolbar{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.8rem 1.2rem}
    .toolbar-left{display:flex;align-items:center;gap:1rem}
    #screenVideo{width:100%;border-radius:12px;border:1px solid var(--border);background:#000;cursor:crosshair;display:block}
    .info-text{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--muted);text-align:center}
  </style>
</head>
<body>

<div id="setupPanel">
  <div class="logo">Remote<span>Link</span></div>
  <div class="card">
    <h2>Start Session</h2>
    <p>Generate a link and share it with the user you want to access</p>
    <button class="btn btn-primary" id="generateBtn" onclick="createSession()">Generate Access Link</button>
    <div class="session-box" id="sessionBox">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:.85rem;color:var(--muted);font-family:'JetBrains Mono',monospace">Status</span>
        <span class="status-badge status-waiting" id="statusBadge"><span class="status-dot"></span>Waiting for user...</span>
      </div>
      <div>
        <div style="font-size:.8rem;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:.4rem">Share this link with User B:</div>
        <div class="link-display" id="sessionLink">—</div>
        <button class="copy-btn" onclick="copyLink()">📋 Copy Link</button>
      </div>
      <button class="btn btn-danger" onclick="endSession()">End Session</button>
    </div>
  </div>
</div>

<div id="remoteView">
  <div class="toolbar">
    <div class="toolbar-left">
      <div class="logo" style="margin:0;font-size:1.1rem">Remote<span style="color:var(--accent)">Link</span></div>
      <span class="status-badge status-connected"><span class="status-dot"></span>Connected</span>
    </div>
    <button class="btn btn-danger" style="width:auto;padding:.5rem 1.2rem;font-size:.9rem" onclick="endSession()">Disconnect</button>
  </div>
  <video id="screenVideo" autoplay playsinline></video>
  <div class="info-text">You are in full control of the remote device.</div>
</div>

<div class="popup-overlay" id="permissionPopup">
  <div class="popup">
    <h3>⚠️ Access Request</h3>
    <p>User B wants to connect. Allow remote access?</p>
    <div class="popup-btns">
      <button class="btn btn-danger" onclick="denyAccess()">❌ DENY</button>
      <button class="btn btn-primary" onclick="allowAccess()">✅ ALLOW</button>
    </div>
  </div>
</div>

<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script>
  const socket = io();
  let sessionId = null;
  let peerConnection = null;
  const iceConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

  function createSession() {
    socket.emit('create-session');
    document.getElementById('generateBtn').disabled = true;
    document.getElementById('generateBtn').textContent = 'Generating...';
  }

  socket.on('session-created', ({ sessionId: id }) => {
    sessionId = id;
    const link = `${window.location.origin}/remote/${id}`;
    document.getElementById('sessionLink').textContent = link;
    document.getElementById('sessionBox').classList.add('active');
    document.getElementById('generateBtn').style.display = 'none';
  });

  function copyLink() {
    navigator.clipboard.writeText(document.getElementById('sessionLink').textContent).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '✅ Copied!';
      setTimeout(() => btn.textContent = '📋 Copy Link', 2000);
    });
  }

  socket.on('access-requested', () => {
    document.getElementById('permissionPopup').classList.add('show');
  });

  function allowAccess() {
    document.getElementById('permissionPopup').classList.remove('show');
    socket.emit('allow-access', { sessionId });
    document.getElementById('statusBadge').className = 'status-badge status-connected';
    document.getElementById('statusBadge').innerHTML = '<span class="status-dot"></span>Connected';
    startWebRTC();
  }

  function denyAccess() {
    document.getElementById('permissionPopup').classList.remove('show');
    socket.emit('deny-access', { sessionId });
  }

  async function startWebRTC() {
    peerConnection = new RTCPeerConnection(iceConfig);
    peerConnection.createDataChannel('control');

    try {
      const stream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: 'always' }, audio: false });
      stream.getTracks().forEach(t => peerConnection.addTrack(t, stream));

      peerConnection.onicecandidate = (e) => {
        if (e.candidate) socket.emit('ice-candidate', { sessionId, candidate: e.candidate, target: 'remote' });
      };

      const offer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(offer);
      socket.emit('offer', { sessionId, offer });

      document.getElementById('setupPanel').style.display = 'none';
      document.getElementById('remoteView').classList.add('active');
    } catch(err) {
      alert('Screen sharing failed. Please allow screen share permission and try again.');
      location.reload();
    }
  }

  socket.on('answer', async ({ answer }) => {
    if (peerConnection) await peerConnection.setRemoteDescription(answer);
  });

  socket.on('ice-candidate', async ({ candidate }) => {
    if (peerConnection && candidate) await peerConnection.addIceCandidate(candidate);
  });

  function endSession() {
    if (sessionId) socket.emit('end-session', { sessionId });
    location.reload();
  }

  socket.on('session-ended', () => location.reload());
</script>
</body>
</html>
